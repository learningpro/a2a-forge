<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="'Geist Sans', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="600" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" fill="#e2e8f0" font-size="22" font-weight="700">A2A Forge — Architecture</text>
  <text x="450" y="68" text-anchor="middle" fill="#64748b" font-size="12">Tauri Desktop + Web Mode | A2A Protocol Workbench</text>

  <!-- ==================== Frontend ==================== -->
  <rect x="30" y="90" width="400" height="230" rx="10" fill="url(#card)" stroke="#334155" stroke-width="1" filter="url(#shadow)"/>
  <text x="50" y="115" fill="#38bdf8" font-size="14" font-weight="600">Frontend (React + Zustand)</text>

  <!-- Components -->
  <rect x="50" y="130" width="110" height="36" rx="6" fill="#1e3a5f" stroke="#2563eb" stroke-width="0.8"/>
  <text x="105" y="153" text-anchor="middle" fill="#93c5fd" font-size="11">AppShell</text>

  <rect x="170" y="130" width="110" height="36" rx="6" fill="#1e3a5f" stroke="#2563eb" stroke-width="0.8"/>
  <text x="225" y="153" text-anchor="middle" fill="#93c5fd" font-size="11">TestPanel</text>

  <rect x="290" y="130" width="120" height="36" rx="6" fill="#1e3a5f" stroke="#2563eb" stroke-width="0.8"/>
  <text x="350" y="153" text-anchor="middle" fill="#93c5fd" font-size="11">ResponseViewer</text>

  <!-- Stores -->
  <rect x="50" y="180" width="80" height="32" rx="6" fill="#1a2e1a" stroke="#22c55e" stroke-width="0.8"/>
  <text x="90" y="200" text-anchor="middle" fill="#86efac" font-size="10">agentStore</text>

  <rect x="140" y="180" width="80" height="32" rx="6" fill="#1a2e1a" stroke="#22c55e" stroke-width="0.8"/>
  <text x="180" y="200" text-anchor="middle" fill="#86efac" font-size="10">testStore</text>

  <rect x="230" y="180" width="80" height="32" rx="6" fill="#1a2e1a" stroke="#22c55e" stroke-width="0.8"/>
  <text x="270" y="200" text-anchor="middle" fill="#86efac" font-size="10">suiteStore</text>

  <rect x="320" y="180" width="90" height="32" rx="6" fill="#1a2e1a" stroke="#22c55e" stroke-width="0.8"/>
  <text x="365" y="200" text-anchor="middle" fill="#86efac" font-size="10">workspaceStore</text>

  <!-- Bindings -->
  <rect x="50" y="228" width="360" height="36" rx="6" fill="#2d1b4e" stroke="#a855f7" stroke-width="0.8"/>
  <text x="230" y="250" text-anchor="middle" fill="#d8b4fe" font-size="11">bindings.ts (tauri-specta auto-generated)</text>

  <!-- Web Polyfill -->
  <rect x="50" y="275" width="170" height="32" rx="6" fill="#3b1a1a" stroke="#ef4444" stroke-width="0.8"/>
  <text x="135" y="295" text-anchor="middle" fill="#fca5a5" font-size="10">web-polyfill.ts (Web Mode)</text>

  <rect x="230" y="275" width="180" height="32" rx="6" fill="#3b1a1a" stroke="#ef4444" stroke-width="0.8"/>
  <text x="320" y="295" text-anchor="middle" fill="#fca5a5" font-size="10">web-backend.ts (localStorage)</text>

  <!-- ==================== Tauri Backend ==================== -->
  <rect x="460" y="90" width="410" height="230" rx="10" fill="url(#card)" stroke="#334155" stroke-width="1" filter="url(#shadow)"/>
  <text x="480" y="115" fill="#fb923c" font-size="14" font-weight="600">Tauri Backend (Rust)</text>

  <rect x="480" y="130" width="160" height="36" rx="6" fill="#3b2a1a" stroke="#f97316" stroke-width="0.8"/>
  <text x="560" y="153" text-anchor="middle" fill="#fdba74" font-size="11">commands/ (77 cmds)</text>

  <rect x="660" y="130" width="190" height="36" rx="6" fill="#3b2a1a" stroke="#f97316" stroke-width="0.8"/>
  <text x="755" y="153" text-anchor="middle" fill="#fdba74" font-size="11">a2a/client.rs (HTTP + polling)</text>

  <rect x="480" y="180" width="120" height="32" rx="6" fill="#3b2a1a" stroke="#f97316" stroke-width="0.8"/>
  <text x="540" y="200" text-anchor="middle" fill="#fdba74" font-size="10">db.rs (SQLite)</text>

  <rect x="610" y="180" width="120" height="32" rx="6" fill="#3b2a1a" stroke="#f97316" stroke-width="0.8"/>
  <text x="670" y="200" text-anchor="middle" fill="#fdba74" font-size="10">credentials.rs</text>

  <rect x="740" y="180" width="110" height="32" rx="6" fill="#3b2a1a" stroke="#f97316" stroke-width="0.8"/>
  <text x="795" y="200" text-anchor="middle" fill="#fdba74" font-size="10">proxy/mod.rs</text>

  <rect x="480" y="228" width="370" height="36" rx="6" fill="#3b2a1a" stroke="#f97316" stroke-width="0.8"/>
  <text x="665" y="250" text-anchor="middle" fill="#fdba74" font-size="11">SQLite WAL — 17 tables, 9 migrations</text>

  <!-- Tauri IPC arrow -->
  <line x1="410" y1="250" x2="460" y2="250" stroke="#a855f7" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="458,246 466,250 458,254" fill="#a855f7"/>
  <text x="435" y="242" text-anchor="middle" fill="#a855f7" font-size="9">IPC</text>

  <!-- ==================== A2A Agents ==================== -->
  <rect x="30" y="350" width="840" height="110" rx="10" fill="url(#card)" stroke="#334155" stroke-width="1" filter="url(#shadow)"/>
  <text x="50" y="378" fill="#34d399" font-size="14" font-weight="600">A2A Protocol Layer</text>

  <!-- Agent boxes -->
  <rect x="50" y="392" width="180" height="50" rx="6" fill="#0a2a1a" stroke="#10b981" stroke-width="0.8"/>
  <text x="140" y="413" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="500">AIGC Service Agent</text>
  <text x="140" y="430" text-anchor="middle" fill="#4ade80" font-size="9">10 skills · async polling</text>

  <rect x="250" y="392" width="180" height="50" rx="6" fill="#0a2a1a" stroke="#10b981" stroke-width="0.8"/>
  <text x="340" y="413" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="500">Mock Agent (Node.js)</text>
  <text x="340" y="430" text-anchor="middle" fill="#4ade80" font-size="9">echo · reverse · image_gen</text>

  <rect x="450" y="392" width="180" height="50" rx="6" fill="#0a2a1a" stroke="#10b981" stroke-width="0.8"/>
  <text x="540" y="413" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="500">Any A2A Agent</text>
  <text x="540" y="430" text-anchor="middle" fill="#4ade80" font-size="9">/.well-known/agent.json</text>

  <!-- Protocol box -->
  <rect x="660" y="392" width="190" height="50" rx="6" fill="#1a1a2e" stroke="#818cf8" stroke-width="0.8"/>
  <text x="755" y="410" text-anchor="middle" fill="#a5b4fc" font-size="10">JSON-RPC 2.0 over HTTP</text>
  <text x="755" y="425" text-anchor="middle" fill="#818cf8" font-size="9">tasks/send → poll tasks/get</text>
  <text x="755" y="438" text-anchor="middle" fill="#818cf8" font-size="9">SSE for streaming</text>

  <!-- Arrows from backend to agents -->
  <line x1="665" y1="270" x2="665" y2="350" stroke="#10b981" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="661,348 665,356 669,348" fill="#10b981"/>
  <text x="680" y="310" fill="#10b981" font-size="9">HTTP/SSE</text>

  <!-- Arrow from web-backend to agents -->
  <line x1="230" y1="307" x2="230" y2="350" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="226,348 230,356 234,348" fill="#ef4444"/>
  <text x="260" y="335" fill="#ef4444" font-size="9">fetch (Web Mode)</text>

  <!-- ==================== Cloud Dev ==================== -->
  <rect x="30" y="490" width="840" height="80" rx="10" fill="url(#card)" stroke="#334155" stroke-width="1" filter="url(#shadow)"/>
  <text x="50" y="518" fill="#fbbf24" font-size="14" font-weight="600">cnb.cool Cloud Dev</text>

  <rect x="50" y="530" width="140" height="28" rx="5" fill="#2a2a0a" stroke="#eab308" stroke-width="0.8"/>
  <text x="120" y="549" text-anchor="middle" fill="#fde047" font-size="10">.cnb.yml</text>

  <rect x="210" y="530" width="140" height="28" rx="5" fill="#2a2a0a" stroke="#eab308" stroke-width="0.8"/>
  <text x="280" y="549" text-anchor="middle" fill="#fde047" font-size="10">WebIDE / VS Code</text>

  <rect x="370" y="530" width="140" height="28" rx="5" fill="#2a2a0a" stroke="#eab308" stroke-width="0.8"/>
  <text x="440" y="549" text-anchor="middle" fill="#fde047" font-size="10">CI Pipeline</text>

  <rect x="530" y="530" width="160" height="28" rx="5" fill="#2a2a0a" stroke="#eab308" stroke-width="0.8"/>
  <text x="610" y="549" text-anchor="middle" fill="#fde047" font-size="10">Docker (node:20)</text>

  <rect x="710" y="530" width="140" height="28" rx="5" fill="#2a2a0a" stroke="#eab308" stroke-width="0.8"/>
  <text x="780" y="549" text-anchor="middle" fill="#fde047" font-size="10">*.cnb.run proxy</text>

  <!-- Footer -->
  <text x="450" y="592" text-anchor="middle" fill="#475569" font-size="10">A2A Forge v0.1.0 — Tauri 2.x + React + Rust + cnb.cool</text>
</svg>
